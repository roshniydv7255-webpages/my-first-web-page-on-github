<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Login Form</title>
    <style>
        /* पूरे पेज का बैकग्राउंड और स्टाइल */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* लॉगिन बॉक्स का स्टाइल */
        .login-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            width: 350px;
            text-align: center;
        }

        .login-container h2 {
            margin-bottom: 24px;
            color: #333333;
            font-size: 28px;
        }

        /* इनपुट फील्ड्स का स्टाइल */
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            color: #666666;
            font-size: 14px;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cccccc;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        /* इनपुट बॉक्स पर क्लिक करने पर इफेक्ट */
        .input-group input:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 8px rgba(102, 126, 234, 0.3);
        }

        /* Remember Me और Forgot Password की लाइन */
        .extra-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            margin-bottom: 24px;
            color: #555555;
        }

        .extra-options a {
            color: #764ba2;
            text-decoration: none;
            font-weight: 600;
        }

        .extra-options a:hover {
            text-decoration: underline;
        }

        /* लॉगिन बटन का स्टाइल */
        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .login-btn:hover {
            opacity: 0.9;
        }

        /* नीचे नया अकाउंट बनाने का लिंक */
        .signup-text {
            margin-top: 20px;
            font-size: 14px;
            color: #666666;
        }

        .signup-text a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }

        .signup-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Login</h2>
        <form action="#">
            <!-- ईमेल या यूज़रनेम -->
            <div class="input-group">
                <label for="username">Email or Username</label>
                <input type="text" id="username" placeholder="Enter your email" required>
            </div>

            <!-- पासवर्ड -->
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>

            <!-- एक्स्ट्रा ऑप्शंस -->
            <div class="extra-options">
                <label>
                    <input type="checkbox"> Remember me
                </label>
                <a href="#">Forgot Password?</a>
            </div>

            <!-- लॉगिन बटन -->
            <button type="submit" class="login-btn">Log In</button>

            <!-- साइन अप लिंक -->
            <p class="signup-text">Don't have an account? <a href="#">Sign Up</a></p>
        </form>
    </div>

</body>
</html>
