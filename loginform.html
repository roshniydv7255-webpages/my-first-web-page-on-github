<!DOCTYPE html>
<html>
<head>
    <title>My Quiz & Feedback Website</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; padding: 20px; background-color: #f4f4f9; }
        .login-container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; font-size: 16px; }
        .btn-like { background: #4CAF50; margin-bottom: 8px; }
        .btn-dislike { background: #f44336; margin-bottom: 8px; }
    </style>
</head>
<body>

<div class="login-container" id="main-box">
    <form id="loginForm">
        <h2>Login</h2>
        <input type="email" placeholder="Enter Email" required>
        <input type="password" placeholder="Enter Password" required>
        <button type="submit">Login</button>
    </form>
</div>

<script>
const quizQuestions = [
    { q: "What does HTML stand for?", a: "Hyper Text Markup Language", options: ["Hyper Text Markup Language", "High Text Machine Language", "Hyper Tabular Machine Language", "Hyper Text Main Language"] },
    { q: "Which technology is used to style a web page?", a: "CSS", options: ["HTML", "CSS", "PHP", "SQL"] },
    { q: "Which of the following is a programming language?", a: "JavaScript", options: ["HTML", "CSS", "JavaScript", "XML"] },
    { q: "Which part of the computer is known as the Brain of the computer?", a: "CPU", options: ["RAM", "ROM", "CPU", "Hard Disk"] },
    { q: "What does WWW stand for?", a: "World Wide Web", options: ["World Wide Web", "World Whole Web", "Web Window World", "Wide World Web"] },
    { q: "Which HTML tag is used for the largest heading?", a: "<h1>", options: ["<h6>", "<head>", "<heading>", "<h1>"] },
    { q: "What does CSS stand for?", a: "Cascading Style Sheets", options: ["Computer Style Sheets", "Cascading Style Sheets", "Colorful Style Sheets", "Creative Style Sheets"] },
    { q: "Which of the following is NOT an internet browser?", a: "MS Word", options: ["Chrome", "Firefox", "Safari", "MS Word"] },
    { q: "What is the file extension of a JavaScript file?", a: ".js", options: [".java", ".js", ".html", ".css"] },
    { q: "Where is data permanently saved in a computer?", a: "Hard Disk", options: ["RAM", "ROM", "Hard Disk", "Cache"] }
];

let currentQuestionIndex = 0;
let score = 0;

document.getElementById('loginForm').addEventListener('submit', function(event) {
    event.preventDefault();
    const container = document.getElementById('main-box');
    
    function loadQuiz() {
        if (currentQuestionIndex < quizQuestions.length) {
            const q = quizQuestions[currentQuestionIndex];
            container.innerHTML = `<h3>Question ${currentQuestionIndex + 1}</h3><p>${q.q}</p>` + 
            q.options.map(opt => `<button onclick="check('${opt}', '${q.a}')">${opt}</button>`).join('');
        } else {
            container.innerHTML = `
                <h2>Quiz Completed!</h2>
                <p style="font-size: 18px;">Your Score: <b>${score}/10</b></p>
                <hr style="border: 0; border-top: 1px solid #ccc; margin: 20px 0;">
                <p>Did you like my website? Click below to send me your choice:</p>
                
                <button onclick="sendFeedback('Liked 👍')" class="btn-like">👍 Like Website</button>
                <button onclick="sendFeedback('Disliked 👎')" class="btn-dislike">👎 Dislike Website</button>
                <button onclick="location.reload()" style="background:#333; margin-top: 15px;">Play Again</button>
            `;
        }
    }

    window.check = (selected, correct) => {
        if(selected === correct) score++;
        currentQuestionIndex++;
        loadQuiz();
    };
    
    loadQuiz();
});


function sendFeedback(userChoice) {
    
    const myEmail = "roshniy7255@gmail.com"; 
    
    const subject = encodeURIComponent("Website Feedback");
    const body = encodeURIComponent(`Hi! I played your computer quiz. My score was ${score}/10 and I ${userChoice} your website!`);
    
   
    window.location.href = `mailto:${myEmail}?subject=${subject}&body=${body}`;
}
</script>

</body>
</html>
